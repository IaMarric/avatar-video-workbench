run:
  display_name: avatar-ltx-i2v-demo
  id: avatar-ltx-i2v-demo
  gcs_root: gs://YOUR_BUCKET/runs/avatar-ltx-i2v-demo

vertex:
  machine_type: a3-highgpu-1g
  accelerator_type: NVIDIA_H100_80GB
  accelerator_count: 1
  boot_disk_size_gb: 1000

container:
  image_uri: REGION-docker.pkg.dev/PROJECT/REPOSITORY/avatar-video-runtime:latest
  command: python -m avatar_video_runtime.ltx_i2v

env:
  CONFIG_URI: gs://YOUR_BUCKET/runs/avatar-ltx-i2v-demo/config/i2v.yaml
  INPUT_IMAGE_URI: gs://YOUR_BUCKET/runs/avatar-ltx-i2v-demo/input/hero.png
  OUTPUT_URI: gs://YOUR_BUCKET/runs/avatar-ltx-i2v-demo/output
  HF_HOME: /workspace/.cache/huggingface

generation:
  model_family: ltx-2.3
  prompt: "A realistic handheld phone video of the same fictional avatar walking through a quiet city street at golden hour."
  negative_prompt: "cartoon, CGI, plastic skin, distorted face, extra fingers, text, watermark"
  width: 768
  height: 1152
  frame_rate: 24
  duration_seconds: 4
  seed: 42

loras:
  - name: character_identity_v1
    uri: gs://YOUR_BUCKET/runs/qwen-character-lora-v1/output/character_identity_v1.safetensors
    strength: 0.65

